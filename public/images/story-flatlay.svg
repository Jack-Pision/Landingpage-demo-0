<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <rect width="800" height="1000" fill="#F0F0F0"/>
  <!-- Wallet -->
  <rect x="150" y="200" width="200" height="140" rx="4" fill="#1A1A1A"/>
  <rect x="150" y="230" width="200" height="2" fill="#2A2A2A"/>
  <rect x="170" y="250" width="60" height="20" rx="2" fill="#3A3A3A"/>
  <!-- Glasses -->
  <path d="M500 250 Q500 230 520 230 L580 230 Q600 230 600 250 L600 290 Q600 310 580 310 L520 310 Q500 310 500 290 Z" fill="none" stroke="#1A1A1A" stroke-width="4"/>
  <path d="M620 250 Q620 230 640 230 L700 230 Q720 230 720 250 L720 290 Q720 310 700 310 L640 310 Q620 310 620 290 Z" fill="none" stroke="#1A1A1A" stroke-width="4"/>
  <line x1="600" y1="260" x2="620" y2="260" stroke="#1A1A1A" stroke-width="3"/>
  <!-- Bracelet -->
  <ellipse cx="400" cy="600" rx="120" ry="50" fill="none" stroke="#3A2F28" stroke-width="16"/>
  <!-- Watch -->
  <circle cx="250" cy="650" r="60" fill="none" stroke="#444444" stroke-width="8"/>
  <circle cx="250" cy="650" r="50" fill="#1A1A1A"/>
  <line x1="250" y1="650" x2="250" y2="620" stroke="#FAFAFA" stroke-width="2"/>
  <line x1="250" y1="650" x2="270" y2="650" stroke="#FAFAFA" stroke-width="2"/>
  <!-- Cards -->
  <rect x="550" y="550" width="100" height="60" rx="3" fill="#2A2A2A"/>
  <rect x="560" y="560" width="80" height="4" fill="#3A3A3A"/>
  <rect x="560" y="575" width="40" height="4" fill="#3A3A3A"/>
  <rect x="540" y="580" width="100" height="60" rx="3" fill="#1A1A1A" transform="rotate(-15 590 610)"/>
</svg>
